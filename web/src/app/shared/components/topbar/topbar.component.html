<header class="flex items-center gap-4 px-6 py-3 bg-neutral border-b border-neutral/80 h-14 flex-shrink-0">

  <!-- Search -->
  <div class="relative flex-1 max-w-md">
    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary/40 text-[18px]">search</span>
    <input
      type="text"
      placeholder="Search architecture nodes..."
      class="w-full pl-9 pr-4 py-2 rounded-md bg-white border border-neutral text-sm text-secondary placeholder:text-secondary/40 focus:outline-none focus:ring-2 focus:ring-primary/50"
    />
  </div>

  <div class="flex-1"></div>

  <!-- Live canvas badge -->
  <div class="flex items-center gap-1.5 px-3 py-1.5 border border-secondary/20 rounded-md text-xs font-headline font-medium text-secondary">
    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
    LIVE CANVAS
  </div>

  <!-- Actions -->
  <button
    class="p-2 rounded-md hover:bg-secondary/5 transition-colors"
    aria-label="Notifications"
  >
    <span class="material-symbols-outlined text-secondary/60 text-[20px]">notifications</span>
  </button>

  <button
    class="p-2 rounded-md hover:bg-secondary/5 transition-colors"
    aria-label="Help"
  >
    <span class="material-symbols-outlined text-secondary/60 text-[20px]">help_outline</span>
  </button>

</header>
