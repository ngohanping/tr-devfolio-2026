<div class="flex flex-col h-full p-8">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="font-headline font-bold text-3xl text-secondary mb-2">Architecture Ecosystem Overview</h1>
    <p class="text-secondary/60">Real-time metrics of your infrastructure landscape</p>
  </div>

  <!-- Stats Grid -->
  @let stats = (stats$ | async);
  @if (stats) {
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <app-stats-card
          icon="groups"
          label="Active Teams"
          [value]="stats.teams"
          description="Teams onboarded"
        />
        <app-stats-card
          icon="folder"
          label="Projects"
          [value]="stats.projects"
          description="In ecosystem"
        />
        <app-stats-card
          icon="router"
          label="Services"
          [value]="stats.services"
          description="Connected"
        />
      </div>
  }
</div>
