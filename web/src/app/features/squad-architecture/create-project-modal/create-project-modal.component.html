<div
  class="fixed inset-0 bg-secondary/40 backdrop-blur-sm z-50 flex items-center justify-center"
  (click)="onBackdropClick($event)"
>
  <!-- Card -->
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md mx-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <h2 class="font-headline font-bold text-secondary text-lg">New Project</h2>
      <button
        (click)="cancelled.emit()"
        aria-label="Close"
        class="p-1.5 rounded hover:bg-neutral transition-colors"
      >
        <span class="material-symbols-outlined text-secondary/40 hover:text-secondary">close</span>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Name field -->
      <div class="mb-4">
        <label class="block font-headline font-semibold text-secondary text-xs mb-1.5">
          Project Name <span class="text-red-500">*</span>
        </label>
        <input
          formControlName="name"
          type="text"
          placeholder="e.g. Payment Squad"
          class="w-full px-3 py-2 rounded-md border border-neutral text-sm text-secondary placeholder:text-secondary/40 focus:outline-none focus:ring-2 focus:ring-primary/40"
        />
        @if (form.controls.name.invalid && form.controls.name.touched) {
          <p class="text-xs text-red-500 mt-1">Name is required</p>
        }
      </div>

      <!-- Description field -->
      <div class="mb-6">
        <label class="block font-headline font-semibold text-secondary text-xs mb-1.5">
          Description
        </label>
        <textarea
          formControlName="description"
          rows="3"
          placeholder="Optional description..."
          class="w-full px-3 py-2 rounded-md border border-neutral text-sm text-secondary placeholder:text-secondary/40 focus:outline-none focus:ring-2 focus:ring-primary/40 resize-none"
        ></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="px-4 py-2 rounded-md text-secondary text-sm font-headline font-semibold hover:bg-neutral transition-colors"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="form.invalid || submitting"
          class="px-4 py-2 rounded-md bg-primary text-secondary text-sm font-headline font-semibold hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
        >
          @if (submitting) {
            <span class="material-symbols-outlined text-[14px] animate-spin">progress_activity</span>
          }
          Create Project
        </button>
      </div>
    </form>
  </div>
</div>
